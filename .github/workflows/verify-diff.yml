name: Verify Build Diff

on: workflow_dispatch

env:
  OFFICIAL_URL: 'https://cloud.dsdog.tk/d/google/temp/%E7%95%AA%E8%8C%84%E5%85%8D%E8%B4%B9%E5%B0%8F%E8%AF%B4_7.2.4.32.apk?sign=xUavME2Rt4Vf1FTbCppPq7sU8bRUFh29hrbIhdsXon4=:0'
  JAVA_TOOL_OPTIONS: '-Xmx6g'

jobs:
  diff:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }

      - name: Install apktool
        run: |
          curl -sL "https://github.com/iBotPeaches/Apktool/releases/download/v3.0.2/apktool_3.0.2.jar" -o /opt/apktool.jar
          printf '#!/bin/bash\njava -jar /opt/apktool.jar "$@"\n' > /opt/apktool && chmod +x /opt/apktool

      - name: Download official APK + fetch build artifact
        run: |
          mkdir -p _downloads _build
          curl -sL -o _downloads/official.apk "$OFFICIAL_URL"

      - name: Get latest successful build APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RID=$(gh run list -R ${{ github.repository }} -w "Fanqie Clean Build Pipeline" --json databaseId,conclusion --jq '.[] | select(.conclusion=="success") | .databaseId' | head -1)
          echo "Downloading from run $RID"
          gh run download "$RID" -n fanqie-clean-apk -D _build/clean 2>/dev/null
          ls -lh _build/clean/

      - name: Parallel decode
        run: |
          /opt/apktool d _downloads/official.apk -o _smali/official -f 2>&1 | tail -1 &
          P1=$!
          /opt/apktool d _build/clean/*.apk -o _smali/clean -f 2>&1 | tail -1 &
          P2=$!
          wait $P1 $P2
          echo "Official: $(find _smali/official -name '*.smali' | wc -l) smali files"
          echo "Clean:    $(find _smali/clean -name '*.smali' | wc -l) smali files"
        timeout-minutes: 12

      - name: Run diff harvester
        run: |
          python3 scripts/smali_diff_harvester.py \
            --official _smali/official \
            --modded _smali/clean \
            --output _diff \
            --report _diff/report.json

      - name: Summary
        run: |
          cat _diff/report.json | python3 -c '
import json,sys
d=json.load(sys.stdin)
for k,v in d.get("stats",{}).items():
    print(f"  {k}: {v}")
print(f"  lancet_hooks: {len(d.get(\"lancet_hooks\",[]))}")
print(f"  dpatch_files: {len(d.get(\"dpatch_files\",[]))}")
'
      - name: Upload diff report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diff-report
          path: _diff/
          retention-days: 30
