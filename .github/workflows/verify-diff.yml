name: Verify Build Diff
on:
  workflow_dispatch:
  workflow_run:
    workflows: ['Fanqie Clean Build Pipeline']
    types: [completed]

env:
  OFFICIAL_URL: 'https://cloud.dsdog.tk/d/google/temp/%E7%95%AA%E8%8C%84%E5%85%8D%E8%B4%B9%E5%B0%8F%E8%AF%B4_7.2.4.32.apk?sign=xUavME2Rt4Vf1FTbCppPq7sU8bRUFh29hrbIhdsXon4=:0'
  JAVA_TOOL_OPTIONS: '-Xmx6g'

jobs:
  diff:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }

      - name: Install apktool
        run: |
          curl -sL "https://github.com/iBotPeaches/Apktool/releases/download/v3.0.2/apktool_3.0.2.jar" -o /opt/apktool.jar
          printf '#!/bin/bash\njava -jar /opt/apktool.jar "$@"\n' > /opt/apktool && chmod +x /opt/apktool

      - name: Download official APK
        run: |
          mkdir -p _downloads _smali _diff
          curl -sL -o _downloads/official.apk "$OFFICIAL_URL"

      - name: Get latest successful build run ID
        id: runid
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RID=$(gh run list -R ${{ github.repository }} -w "Fanqie Clean Build Pipeline" --json databaseId,conclusion --jq '.[] | select(.conclusion=="success") | .databaseId' | head -1)
          echo "run_id=$RID" >> "$GITHUB_OUTPUT"

      - name: Download build artifact (workflow_run trigger)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: fanqie-clean-apk
          path: /tmp/clean-apk
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Download build artifact (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@v4
        with:
          name: fanqie-clean-apk
          path: /tmp/clean-apk
          run-id: ${{ steps.runid.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Extract APK from artifact
        run: |
          cd /tmp/clean-apk && ls -la && find . -name '*.apk' | head -3
          APK=$(find /tmp/clean-apk -name '*.apk' -type f | head -1)
          if [ -z "$APK" ]; then
            unzip -o /tmp/clean-apk/*.zip -d /tmp/clean-apk-extracted 2>/dev/null || true
            APK=$(find /tmp/clean-apk-extracted -name '*.apk' -type f | head -1)
          fi
          echo "APK: $APK"
          cp "$APK" /tmp/clean.apk
          ls -lh /tmp/clean.apk

      - name: Parallel decode
        run: |
          /opt/apktool d _downloads/official.apk -o _smali/official -f &
          PID1=$!
          /opt/apktool d /tmp/clean.apk -o _smali/clean -f &
          PID2=$!
          wait $PID1 $PID2
          echo "Official: $(find _smali/official -name '*.smali' | wc -l)"
          echo "Clean:    $(find _smali/clean -name '*.smali' | wc -l)"
        timeout-minutes: 12

      - name: Run diff harvester
        run: |
          python3 scripts/smali_diff_harvester.py \
            --official _smali/official \
            --modded _smali/clean \
            --output _diff \
            --report _diff/report.json

      - name: Show summary
        run: python3 scripts/verify-diff-summary.py _diff/report.json

      - name: Upload diff report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diff-report
          path: _diff/
          retention-days: 30
