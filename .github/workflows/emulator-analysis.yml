name: Emulator Traffic Analysis

on:
  workflow_dispatch:

env:
  OFFICIAL_URL: 'https://cloud.dsdog.tk/d/google/temp/%E7%95%AA%E8%8C%84%E5%85%8D%E8%B4%B9%E5%B0%8F%E8%AF%B4_7.2.4.32.apk?sign=xUavME2Rt4Vf1FTbCppPq7sU8bRUFh29hrbIhdsXon4=:0'
  MODDED_URL: 'https://github.com/callacat/gha-build-farm/releases/download/apk-assets/fanqie_novel_7.2.4.19.apk'

jobs:
  traffic-compare:
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    steps:
      - name: Install mitmproxy
        run: pip install mitmproxy -q

      - name: Download APKs (strip arm64 libs)
        run: |
          mkdir -p /tmp/apks /tmp/results
          curl -sL -o /tmp/apks/official.apk "$OFFICIAL_URL"
          curl -sL -o /tmp/apks/modded.apk "$MODDED_URL"
          for f in official modded; do
            cp /tmp/apks/$f.apk /tmp/apks/$f-stripped.apk
            (cd /tmp/apks && zip -d $f-stripped.apk "lib/*" 2>/dev/null || true)
          done
          ls -lh /tmp/apks/

      - name: Run emulator + capture
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: default
          arch: x86_64
          ram-size: 3072M
          disk-size: 4096M
          emulator-options: -no-window -no-audio -no-boot-anim -no-snapshot -memory 2048 -wipe-data
          disable-animations: true
          boot-timeout: 600s
          script: |
            APKS=/tmp/apks; R=/tmp/results

            test_apk() {
              LABEL=$1; APK=$2
              echo "=== [$LABEL] Install ==="
              adb uninstall com.dragon.read 2>/dev/null || true
              adb install -t "$APK" 2>&1 | tail -5 || { echo "INSTALL FAIL"; return; }

              echo "=== [$LABEL] Start mitmdump ==="
              mitmdump -w "$R/$LABEL.flow" --set block_global=false --listen-port 8080 &
              MPID=$!
              sleep 2

              adb shell settings put global http_proxy 10.0.2.2:8080 2>/dev/null || true

              echo "=== [$LABEL] Launch ==="
              adb shell am start -n com.dragon.read/.pages.splash.SplashActivity 2>/dev/null || true
              sleep 20

              kill $MPID 2>/dev/null || true
              wait $MPID 2>/dev/null || true
              adb shell settings delete global http_proxy 2>/dev/null || true
            }

            test_apk "official" "$APKS/official-stripped.apk"
            test_apk "modded" "$APKS/modded-stripped.apk"

            echo "=== Diff ==="
            for label in official modded; do
              [ -f "$R/$label.flow" ] || continue
              # Extract URLs + status codes
              mitmdump -nr "$R/$label.flow" -s /dev/stdin 2>/dev/null > "$R/$label-raw.txt" <<'PYEOF' || true
from mitmproxy import http
def response(flow: http.HTTPFlow):
    u = flow.request.pretty_url
    print(f"{flow.response.status_code} {u}")
PYEOF
              # Clean URLs: normalize, sort, dedupe
              sed 's|^[0-9][0-9][0-9] ||; s|?.*||; s|/[0-9a-f]\{8,\}|/HASH|g' "$R/$label-raw.txt" | sort -u > "$R/$label-urls.txt"
              echo "$label: $(wc -l < "$R/$label-urls.txt") unique endpoints"
            done

            # Diff
            {
              echo "=== ONLY in official ==="
              comm -23 "$R/official-urls.txt" "$R/modded-urls.txt" 2>/dev/null || true
              echo "=== ONLY in modded ==="
              comm -13 "$R/official-urls.txt" "$R/modded-urls.txt" 2>/dev/null || true
              echo "=== OFFICIAL total: $(wc -l < "$R/official-urls.txt" 2>/dev/null || echo 0)"
              echo "=== MODDED total:   $(wc -l < "$R/modded-urls.txt" 2>/dev/null || echo 0)"
            } | tee "$R/traffic-diff.txt"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traffic-analysis
          path: /tmp/results/
          retention-days: 30
