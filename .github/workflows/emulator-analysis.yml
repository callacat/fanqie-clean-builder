name: Emulator Traffic Analysis

on:
  workflow_dispatch:

env:
  OFFICIAL_URL: 'https://cloud.dsdog.tk/d/google/temp/%E7%95%AA%E8%8C%84%E5%85%8D%E8%B4%B9%E5%B0%8F%E8%AF%B4_7.2.4.32.apk?sign=xUavME2Rt4Vf1FTbCppPq7sU8bRUFh29hrbIhdsXon4=:0'
  MODDED_URL: 'https://github.com/callacat/gha-build-farm/releases/download/apk-assets/fanqie_novel_7.2.4.19.apk'

jobs:
  traffic-compare:
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    steps:
      - name: Install mitmproxy
        run: pip install mitmproxy -q

      - name: Download APKs (strip arm64 libs)
        run: |
          mkdir -p /tmp/apks /tmp/results
          curl -sL -o /tmp/apks/official.apk "$OFFICIAL_URL"
          curl -sL -o /tmp/apks/modded.apk "$MODDED_URL"
          for f in official modded; do
            cp /tmp/apks/$f.apk /tmp/apks/$f-stripped.apk
            (cd /tmp/apks && zip -d $f-stripped.apk "lib/*" 2>/dev/null || true)
          done

      - name: Write capture script
        run: |
          cat > /tmp/capture.sh <<'SCRIPT'
          capture() {
            L="$1" A="$2"
            echo "=== [$L] Install ==="
            adb uninstall com.dragon.read 2>/dev/null || true
            adb install -t "$A" 2>&1 | tail -5 || { echo "INSTALL FAIL"; return; }
            echo "=== [$L] mitmdump ==="
            mitmdump -w "/tmp/results/$L.flow" --set block_global=false --listen-port 8080 &
            sleep 2
            adb shell settings put global http_proxy 10.0.2.2:8080 2>/dev/null || true
            echo "=== [$L] Launch ==="
            adb shell am start -n com.dragon.read/.pages.splash.SplashActivity 2>/dev/null || true
            sleep 20
            kill %1 2>/dev/null || true; wait 2>/dev/null || true
            adb shell settings delete global http_proxy 2>/dev/null || true
          }
          capture official /tmp/apks/official-stripped.apk
          capture modded /tmp/apks/modded-stripped.apk

          echo "=== Diff ==="
          for L in official modded; do
            [ -f "/tmp/results/$L.flow" ] || continue
            mitmdump -nr "/tmp/results/$L.flow" -s /dev/stdin 2>/dev/null <<'PYEOF' | sed 's|?.*||; s|/[0-9a-f]\{8,\}|/HASH|g' | sort -u > "/tmp/results/$L-urls.txt" || true
      from mitmproxy import http
      def response(flow: http.HTTPFlow):
          print(f"{flow.response.status_code} {flow.request.pretty_url}")
      PYEOF
            echo "$L: $(wc -l < "/tmp/results/$L-urls.txt" 2>/dev/null || echo 0)"
          done
          {
            echo "=== Official only ==="
            comm -23 /tmp/results/official-urls.txt /tmp/results/modded-urls.txt 2>/dev/null || true
            echo "=== Modded only ==="
            comm -13 /tmp/results/official-urls.txt /tmp/results/modded-urls.txt 2>/dev/null || true
          } > /tmp/results/traffic-diff.txt
          cat /tmp/results/traffic-diff.txt
          SCRIPT
          chmod +x /tmp/capture.sh

      - name: Run emulator + capture
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: default
          arch: x86_64
          ram-size: 3072M
          disk-size: 4096M
          emulator-options: -no-window -no-audio -no-boot-anim -no-snapshot -memory 2048 -wipe-data
          disable-animations: true
          emulator-boot-timeout: 600
          script: bash /tmp/capture.sh

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traffic-analysis
          path: /tmp/results/
          retention-days: 30
