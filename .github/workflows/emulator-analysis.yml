name: Emulator Traffic Analysis

on:
  workflow_dispatch:
    inputs:
      official_apk_url:
        description: 'Official APK URL (leave empty for default)'
        required: false
        default: ''
      modded_apk_url:
        description: 'Modded APK URL (leave empty for default)'
        required: false
        default: ''

env:
  OFFICIAL_URL: 'https://cloud.dsdog.tk/d/google/temp/%E7%95%AA%E8%8C%84%E5%85%8D%E8%B4%B9%E5%B0%8F%E8%AF%B4_7.2.4.32.apk?sign=xUavME2Rt4Vf1FTbCppPq7sU8bRUFh29hrbIhdsXon4=:0'
  MODDED_URL: 'https://github.com/callacat/gha-build-farm/releases/download/apk-assets/fanqie_novel_7.2.4.19.apk'

jobs:
  traffic-compare:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Install tools
        run: |
          pip install mitmproxy 2>/dev/null || true

      - name: Download APKs
        run: |
          OFF="${1:-$OFFICIAL_URL}"
          MOD="${2:-$MODDED_URL}"
          mkdir -p /tmp/apks /tmp/results
          curl -sL -o /tmp/apks/official.apk "${inputs.official_apk_url:-$OFFICIAL_URL}"
          curl -sL -o /tmp/apks/modded.apk "${inputs.modded_apk_url:-$MODDED_URL}"
          ls -lh /tmp/apks/

      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: default
          arch: x86_64
          ram-size: 3072M
          disk-size: 4096M
          emulator-options: -no-window -no-audio -no-boot-anim -no-snapshot -memory 2048 -wipe-data
          disable-animations: true
          boot-timeout: 600s
          script: |
            set -e
            APKS=/tmp/apks
            RESULTS=/tmp/results
            mkdir -p "$RESULTS"

            # ── Setup: install mitmproxy CA cert ──
            echo "=== Setup mitmproxy CA ==="
            pip install mitmproxy -q
            mitmdump --no-http2 &
            sleep 3
            CERT=~/.mitmproxy/mitmproxy-ca-cert.cer
            if [ -f "$CERT" ]; then
              HASH=$(openssl x509 -inform PEM -subject_hash_old -in "$CERT" 2>/dev/null | head -1)
              adb root
              adb remount 2>/dev/null || true
              adb push "$CERT" "/system/etc/security/cacerts/${HASH:-c8750f0d}.0" 2>/dev/null || true
              adb shell chmod 644 "/system/etc/security/cacerts/${HASH:-c8750f0d}.0" 2>/dev/null || true
              echo "mitmproxy CA pushed"
            fi
            kill %1 2>/dev/null || true

            # ── Test 1: Official APK ──
            echo "=== Test 1: Official APK ==="
            adb install -t "$APKS/official.apk" 2>&1 | head -3

            # Start mitmproxy
            mitmdump -w "$RESULTS/official.flow" --set block_global=false --listen-port 8080 &
            MPID=$!
            sleep 2

            # Set proxy
            adb shell settings put global http_proxy 10.0.2.2:8080 2>/dev/null || true

            # Launch
            adb shell am start -n com.dragon.read/.pages.splash.SplashActivity 2>/dev/null || true
            sleep 20

            # Stop mitmproxy
            kill $MPID 2>/dev/null || true
            sleep 2
            adb shell settings put global http_proxy :0 2>/dev/null || true

            # Screenshot
            adb shell screencap -p /sdcard/screen1.png 2>/dev/null || true
            adb pull /sdcard/screen1.png "$RESULTS/official-screen.png" 2>/dev/null || true

            # ── Test 2: Modded APK ──
            echo "=== Test 2: Modded APK ==="
            # Uninstall official, install modded
            adb uninstall com.dragon.read 2>/dev/null || true
            adb install -t "$APKS/modded.apk" 2>&1 | head -3

            mitmdump -w "$RESULTS/modded.flow" --set block_global=false --listen-port 8080 &
            MPID=$!
            sleep 2
            adb shell settings put global http_proxy 10.0.2.2:8080 2>/dev/null || true
            adb shell am start -n com.dragon.read/.pages.splash.SplashActivity 2>/dev/null || true
            sleep 20
            kill $MPID 2>/dev/null || true
            adb shell settings put global http_proxy :0 2>/dev/null || true
            adb shell screencap -p /sdcard/screen2.png 2>/dev/null || true
            adb pull /sdcard/screen2.png "$RESULTS/modded-screen.png" 2>/dev/null || true

            # ── Generate diff report ──
            echo "=== Generating diff report ==="
            if command -v mitmdump &>/dev/null && [ -f "$RESULTS/official.flow" ]; then
              mitmdump -nr "$RESULTS/official.flow" -s /dev/stdin 2>/dev/null <<'PYEOF' | sort > "$RESULTS/official-requests.txt" || true
from mitmproxy import http
def response(flow: http.HTTPFlow):
    print(f"{flow.request.method} {flow.request.pretty_url} | {flow.response.status_code} | {len(flow.response.content)} bytes")
PYEOF
            fi
            if command -v mitmdump &>/dev/null && [ -f "$RESULTS/modded.flow" ]; then
              mitmdump -nr "$RESULTS/modded.flow" -s /dev/stdin 2>/dev/null <<'PYEOF' | sort > "$RESULTS/modded-requests.txt" || true
from mitmproxy import http
def response(flow: http.HTTPFlow):
    print(f"{flow.request.method} {flow.request.pretty_url} | {flow.response.status_code} | {len(flow.response.content)} bytes")
PYEOF
            fi

            # Diff
            if [ -f "$RESULTS/official-requests.txt" ] && [ -f "$RESULTS/modded-requests.txt" ]; then
              echo "=== Requests ONLY in official ===" > "$RESULTS/traffic-diff.txt"
              comm -23 "$RESULTS/official-requests.txt" "$RESULTS/modded-requests.txt" >> "$RESULTS/traffic-diff.txt"
              echo "" >> "$RESULTS/traffic-diff.txt"
              echo "=== Requests ONLY in modded ===" >> "$RESULTS/traffic-diff.txt"
              comm -13 "$RESULTS/official-requests.txt" "$RESULTS/modded-requests.txt" >> "$RESULTS/traffic-diff.txt"
              echo "" >> "$RESULTS/traffic-diff.txt"
              echo "=== Total requests ===" >> "$RESULTS/traffic-diff.txt"
              echo "Official: $(wc -l < "$RESULTS/official-requests.txt")" >> "$RESULTS/traffic-diff.txt"
              echo "Modded:   $(wc -l < "$RESULTS/modded-requests.txt")" >> "$RESULTS/traffic-diff.txt"
            fi
            echo "Total official requests: $(wc -l < $RESULTS/official-requests.txt 2>/dev/null || echo 0)"
            echo "Total modded requests:   $(wc -l < "$RESULTS/modded-requests.txt" 2>/dev/null || echo 0)"
            echo "DONE"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traffic-analysis
          path: /tmp/results/
          retention-days: 30
