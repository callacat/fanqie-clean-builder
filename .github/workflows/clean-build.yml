name: Fanqie Clean Build Pipeline

on:
  workflow_dispatch:
    inputs:
      skip_emulator:
        description: 'Skip Android Emulator verification'
        type: boolean
        default: false

env:
  OFFICIAL_URL: 'https://cloud.dsdog.tk/d/google/temp/%E7%95%AA%E8%8C%84%E5%85%8D%E8%B4%B9%E5%B0%8F%E8%AF%B4_7.2.4.32.apk?sign=xUavME2Rt4Vf1FTbCppPq7sU8bRUFh29hrbIhdsXon4=:0'
  MODDED_URL: 'https://github.com/callacat/gha-build-farm/releases/download/apk-assets/fanqie_novel_7.2.4.19.apk'
  JAVA_TOOL_OPTIONS: '-Xmx6g'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }

      - name: Install apktool
        run: |
          curl -sL "https://github.com/iBotPeaches/Apktool/releases/download/v3.0.2/apktool_3.0.2.jar" -o /opt/apktool.jar
          printf '#!/bin/bash\njava -jar /opt/apktool.jar "$@"\n' > /opt/apktool && chmod +x /opt/apktool

      - name: Download both APKs
        run: |
          mkdir -p _downloads _build
          curl -sL -o _downloads/official.apk "$OFFICIAL_URL"
          curl -sL -o _downloads/modded.apk "$MODDED_URL"

      - name: Parallel decode
        run: |
          /opt/apktool if _downloads/official.apk 2>&1 | tail -1 || true
          /opt/apktool d _downloads/official.apk -o _build/off -f &
          P1=$!
          /opt/apktool d _downloads/modded.apk -o _build/mod -f &
          P2=$!
          wait $P1; wait $P2 || /opt/apktool d _downloads/modded.apk -o _build/mod -f 2>&1 | tail -3
          [ -f _build/off/AndroidManifest.xml ] && [ -f _build/mod/AndroidManifest.xml ] && echo "OK" || exit 1

      - name: Extract Lancet hooks from modded, overlay onto official
        run: |
          # Content-hash compare to find modified files
          python3 scripts/smali_diff_harvester.py \
            --official _build/off --modded _build/mod \
            --output _patches --report _patches/patch-report.json
          # Only overlay Lancet hooks, sign-checks, device-spoof (not all 1,422 logical changes)
          python3 scripts/overlay-patches.py \
            --lancet-only \
            --official _build/off --modded _build/mod \
            --report _patches/patch-report.json

      - name: Strip Ad SDK + Push + Tracking
        run: |
          python3 scripts/remove-ad-sdk.py \
            --source _build/off \
            --ad-config config/ad-removal.json \
            --push-config config/push-removal.json \
            --permissions-keep config/permissions-keep.txt

      - name: Modify Manifest
        run: |
          python3 scripts/modify-manifest.py \
            --manifest _build/off/AndroidManifest.xml \
            --push-config config/push-removal.json \
            --permissions-keep config/permissions-keep.txt

      - name: Rebuild APK
        run: |
          /opt/apktool b _build/off -o _build/fanqie-unsigned.apk 2>&1 | tail -5
          ls -lh _build/fanqie-unsigned.apk || exit 1

      - name: Sign APK
        run: |
          [ -f debug.keystore ] || keytool -genkey -v -keystore debug.keystore -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android \
            -dname "CN=Debug,O=Clean,C=CN"
          jarsigner -sigalg SHA1withRSA -digestalg SHA1 \
            -keystore debug.keystore -storepass android \
            _build/fanqie-unsigned.apk debug 2>&1 | tail -2
          mv _build/fanqie-unsigned.apk _build/fanqie-clean.apk

      - name: Verify APK
        run: |
          ls -lh _build/fanqie-clean.apk
          unzip -l _build/fanqie-clean.apk 2>/dev/null | grep -q AndroidManifest.xml && echo "VALID" || echo "INVALID"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fanqie-clean-apk
          path: _build/fanqie-clean.apk
          retention-days: 90

  emulator-test:
    needs: build
    if: ${{ !cancelled() && !inputs.skip_emulator }}
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: fanqie-clean-apk
          path: _apk/

      - name: Find APK
        id: apk
        run: |
          APK=$(find _apk -name '*.apk' -type f | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"

      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          ram-size: 3072M
          emulator-options: -no-window -no-audio -no-boot-anim -memory 2048
          disable-animations: true
          script: |
            mkdir -p /tmp/r
            adb install -t "${{ steps.apk.outputs.path }}" | tee /tmp/r/install.txt
            adb shell am start -n com.dragon.read/.pages.splash.SplashActivity || true
            sleep 5
            adb logcat -c 2>/dev/null || true
            adb logcat > /tmp/r/logcat.txt &
            sleep 15; kill %1 2>/dev/null || true
            grep -E "AndroidRuntime|FATAL|CRASH" /tmp/r/logcat.txt > /tmp/r/crash.txt || true
            [ -s /tmp/r/crash.txt ] && echo "CRASH" && cat /tmp/r/crash.txt || echo "OK"
            grep -iE "pandora|CreatorProxy|ShadowHook" /tmp/r/logcat.txt > /tmp/r/hook.txt || true
            [ -s /tmp/r/hook.txt ] && echo "HOOK OK" || echo "NO HOOK"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: emulator-verification
          path: /tmp/r/
          retention-days: 14
