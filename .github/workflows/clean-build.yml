name: Fanqie Clean Build Pipeline
on: workflow_dispatch
env:
  MODDED_URL: 'https://github.com/callacat/gha-build-farm/releases/download/apk-assets/fanqie_novel_7.2.4.19.apk'
  OFFICIAL_URL: 'https://cloud.dsdog.tk/d/google/temp/%E7%95%AA%E8%8C%84%E5%85%8D%E8%B4%B9%E5%B0%8F%E8%AF%B4_7.2.4.32.apk?sign=xUavME2Rt4Vf1FTbCppPq7sU8bRUFh29hrbIhdsXon4=:0'
  JAVA_TOOL_OPTIONS: '-Xmx6g'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }

      - name: Install apktool
        run: |
          curl -sL "https://github.com/iBotPeaches/Apktool/releases/download/v3.0.2/apktool_3.0.2.jar" -o /opt/apktool.jar
          printf '#!/bin/bash\njava -jar /opt/apktool.jar "$@"\n' > /opt/apktool && chmod +x /opt/apktool

      - name: Download & decode modded APK
        run: |
          mkdir -p _downloads _build _smali _diff
          curl -sL -o _downloads/modded.apk "$MODDED_URL"
          /opt/apktool if _downloads/modded.apk 2>&1 | tail -1 || true
          /opt/apktool d _downloads/modded.apk -o _build/source -f
          [ -f _build/source/AndroidManifest.xml ] || exit 1
          echo "Smali files: $(find _build/source -name '*.smali' | wc -l)"

      - name: Nuke invalid resource dirs
        run: |
          rm -rf _build/source/res/invalid15 2>/dev/null || true
          PUB="_build/source/res/values/public.xml"
          [ -f "$PUB" ] && grep -vE 'type="invalid[0-9]+"' "$PUB" > "${PUB}.clean" && mv "${PUB}.clean" "$PUB"

      - name: Strip Ad SDK + Push + Tracking
        run: |
          python3 scripts/remove-ad-sdk.py \
            --source _build/source \
            --ad-config config/ad-removal.json \
            --push-config config/push-removal.json \
            --permissions-keep config/permissions-keep.txt

      - name: Strip DPatch tracking (keep CreatorProxy + DATA + ۧۤۤ)
        run: |
          rm -f $(find _build/source -path "*/pandora/core/AppFactory.smali" ! -path "*\$DATA*") 2>/dev/null || true
          rm -f $(find _build/source -path "*/pandora/core/Copyright.smali") 2>/dev/null || true
          echo "Remaining:"
          find _build/source -path "*/pandora/core/*" -name "*.smali" 2>/dev/null || echo "none"

      - name: Modify Manifest
        run: |
          python3 scripts/modify-manifest.py --component-factory "androidx.core.app.CoreComponentFactory" \
            --manifest _build/source/AndroidManifest.xml \
            --push-config config/push-removal.json \
            --permissions-keep config/permissions-keep.txt

      - name: Rebuild APK
        run: |
          /opt/apktool b _build/source -o _build/fanqie-unsigned.apk 2>&1 | tail -5
          ls -lh _build/fanqie-unsigned.apk || exit 1

      - name: Sign APK (V2+V3 via apksigner)
        run: |
          [ -f debug.keystore ] || keytool -genkey -v -keystore debug.keystore -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android \
            -dname "CN=Debug,O=Clean,C=CN" 2>/dev/null
          SDK=/usr/local/lib/android/sdk
          BT=$(find "$SDK/build-tools" -maxdepth 1 -type d | sort -Vr | head -1)
          # Strip old signatures, then zipalign + apksigner V2+V3
          zip -d _build/fanqie-unsigned.apk 'META-INF/*.SF' 'META-INF/*.RSA' 'META-INF/*.DSA' 2>/dev/null || true
          "$BT/zipalign" -v -p 4 _build/fanqie-unsigned.apk /tmp/fanqie-aligned.apk 2>&1 | tail -1
          "$BT/apksigner" sign --ks debug.keystore --ks-pass pass:android \
            --ks-key-alias debug --v2-signing-enabled true --v3-signing-enabled true \
            --out _build/fanqie-clean.apk /tmp/fanqie-aligned.apk 2>&1 | tail -3
          "$BT/apksigner" verify --verbose _build/fanqie-clean.apk 2>&1 | head -8
          ls -lh _build/fanqie-clean.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fanqie-clean-apk
          path: _build/fanqie-clean.apk
          retention-days: 90

      # =============== IN-JOB DIFF (same job, no cross-artifact download) ===============

      - name: Download official APK for diff
        run: |
          curl -sL -o /tmp/official.apk "$OFFICIAL_URL"
          ls -lh /tmp/official.apk

      - name: Decode official + clean for diff
        run: |
          /opt/apktool d /tmp/official.apk -o _smali/official -f &
          P1=$!
          /opt/apktool d _build/fanqie-clean.apk -o _smali/clean -f &
          P2=$!
          wait $P1 || { echo "official decode failed"; exit 1; }
          wait $P2 || { echo "clean decode failed"; exit 1; }
          echo "Official smali: $(find _smali/official -name '*.smali' | wc -l)"
          echo "Clean smali:   $(find _smali/clean -name '*.smali' | wc -l)"
        timeout-minutes: 12

      - name: Run diff harvester
        run: |
          python3 scripts/smali_diff_harvester.py \
            --official _smali/official \
            --modded _smali/clean \
            --output _diff \
            --report _diff/report.json

      - name: Show diff summary
        run: python3 scripts/verify-diff-summary.py _diff/report.json

      - name: Upload diff report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diff-report
          path: _diff/
          retention-days: 30

  # =============== B: STRUCTURAL CHECK (fast, no emulator needed) ===============

  structural-check:
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: fanqie-clean-apk
          path: _test

      - name: APK structure validation
        run: |
          APK=_test/fanqie-clean.apk
          echo "=== APK size ==="
          ls -lh "$APK"
          echo "=== Package name & version ==="
          XML=$(unzip -p "$APK" AndroidManifest.xml 2>/dev/null | strings)
          PKG=$(echo "$XML" | grep -oP 'package="\K[^"]+' | head -1)
          VER=$(echo "$XML" | grep -oP 'versionName="\K[^"]+' | head -1)
          MINI=$(echo "$XML" | grep -oP 'android:minSdkVersion\s*=\s*"\K[^"]+' | head -1)
          echo "  package: ${PKG:-unknown}"
          echo "  versionName: ${VER:-unknown}"
          echo "  minSdkVersion: ${MINI:-unknown}"
          echo "=== Ad/push SDK manifest refs ==="
          echo "$XML" | grep -c "com.bytedance.push" >/dev/null && echo "  ⚠️ push refs remain" || echo "  ✅ no push refs"
          for sdk in luckycat pangle baidu.mobads sigmob kuaishou; do
            unzip -l "$APK" 2>/dev/null | grep -qi "smali.*$sdk" && echo "  ⚠️ $sdk remains" || echo "  ✅ $sdk removed"
          done
