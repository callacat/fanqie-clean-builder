name: Fanqie Clean Build Pipeline

on:
  workflow_dispatch:
    inputs:
      skip_emulator:
        description: 'Skip Android Emulator verification'
        type: boolean
        default: false

env:
  APK_URL: 'https://github.com/callacat/gha-build-farm/releases/download/apk-assets/fanqie_novel_7.2.4.19.apk'
  JAVA_TOOL_OPTIONS: '-Xmx6g'

jobs:
  build:
    if: ${{ !cancelled() }}
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install apktool
        run: |
          curl -sL "https://github.com/iBotPeaches/Apktool/releases/download/v3.0.2/apktool_3.0.2.jar" -o /opt/apktool.jar
          printf '#!/bin/bash\njava -jar /opt/apktool.jar "$@"\n' | tee /opt/apktool
          chmod +x /opt/apktool

      - name: Download modded APK
        run: |
          mkdir -p _downloads _build
          curl -sL -o _downloads/modded.apk "$APK_URL"
          ls -lh _downloads/modded.apk

      - name: Decode modded APK
        run: |
          /opt/apktool if _downloads/modded.apk 2>&1 | tail -1 || true
          /opt/apktool d _downloads/modded.apk -o _build/source -f
          echo "Smali files: $(find _build/source -name '*.smali' | wc -l)"
          echo "Manifest: $([ -f _build/source/AndroidManifest.xml ] && echo OK || echo MISSING)"
        timeout-minutes: 12

      - name: Strip Ad SDK + Push + Tracking
        run: |
          python3 scripts/remove-ad-sdk.py \
            --source _build/source \
            --ad-config config/ad-removal.json \
            --push-config config/push-removal.json \
            --permissions-keep config/permissions-keep.txt

      - name: Remove DPatch tracking files (AppFactory full, obfuscated helpers, copyright)
        run: |
          for f in "com/pandora/core/AppFactory.smali" "com/pandora/core/Copyright.smali" "com/pandora/core/ۧۤۤ.smali"; do
            FOUND=$(find _build/source -path "*/$f" 2>/dev/null)
            if [ -n "$FOUND" ]; then
              rm -f "$FOUND"
              echo "Removed: $FOUND"
            fi
          done
          # Verify only CreatorProxy + DATA remain
          echo "Remaining pandora-core files:"
          find _build/source -path "*/pandora/core/*" -name "*.smali" 2>/dev/null

      - name: Modify Manifest
        run: |
          python3 scripts/modify-manifest.py \
            --manifest _build/source/AndroidManifest.xml \
            --push-config config/push-removal.json \
            --permissions-keep config/permissions-keep.txt
          grep -E 'appComponentFactory|usesCleartextTraffic' _build/source/AndroidManifest.xml

      - name: Rebuild APK
        run: |
          # Strip invalid resource type references from public.xml
          PUB="_build/source/res/values/public.xml"
          if [ -f "$PUB" ]; then
            grep -v 'type="invalid[0-9]"' "$PUB" > "${PUB}.clean" && mv "${PUB}.clean" "$PUB"
            echo "Fixed public.xml: removed invalid type refs"
          fi
          /opt/apktool b _build/source -o _build/fanqie-unsigned.apk 2>&1 | tail -10
          ls -lh _build/fanqie-unsigned.apk || { echo "BUILD FAILED"; exit 1; }

      - name: Sign APK
        run: |
          if [ ! -f debug.keystore ]; then
            keytool -genkey -v -keystore debug.keystore -alias debug \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Debug,O=Clean,C=CN"
          fi
          jarsigner -sigalg SHA1withRSA -digestalg SHA1 \
            -keystore debug.keystore -storepass android \
            _build/fanqie-unsigned.apk debug 2>&1 | tail -3
          mv _build/fanqie-unsigned.apk _build/fanqie-clean.apk
          ls -lh _build/fanqie-clean.apk

      - name: Verify APK
        run: |
          SIZE=$(stat -c%s _build/fanqie-clean.apk)
          echo "APK size: $SIZE bytes ($((SIZE/1024/1024)) MB)"
          unzip -l _build/fanqie-clean.apk 2>/dev/null | grep -q AndroidManifest.xml && echo "VALID: has manifest"
          unzip -l _build/fanqie-clean.apk 2>/dev/null | grep -q "\.dex" && echo "VALID: has DEX"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fanqie-clean-apk
          path: _build/fanqie-clean.apk
          retention-days: 90

  emulator-test:
    needs: build
    if: ${{ !cancelled() && !inputs.skip_emulator }}
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: fanqie-clean-apk
          path: _apk/

      - name: Find APK
        id: apk
        run: |
          APK=$(find _apk -name '*.apk' -type f | head -1)
          echo "APK: $APK ($(stat -c%s "$APK" 2>/dev/null) bytes)"
          echo "path=$APK" >> "$GITHUB_OUTPUT"

      - name: Android Emulator Test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          ram-size: 3072M
          heap-size: 1024M
          disk-size: 4096M
          emulator-options: -no-window -no-audio -no-boot-anim -no-snapshot -memory 2048
          disable-animations: true
          script: |
            set -e
            mkdir -p /tmp/results
            echo "=== [1/5] Boot ==="
            adb wait-for-device
            adb shell getprop sys.boot_completed | grep -q "1" || exit 1
            echo "=== [2/5] Install ==="
            adb install -t "${{ steps.apk.outputs.path }}" 2>&1 | tee /tmp/results/install.txt
            echo "=== [3/5] Launch ==="
            adb shell am start -n com.dragon.read/.pages.splash.SplashActivity -W -S 2>&1 | tee /tmp/results/launch.txt || true
            sleep 5
            echo "=== [4/5] Logcat (20s) ==="
            adb logcat -c 2>/dev/null || true
            adb logcat > /tmp/results/logcat.txt &
            LP=$!; sleep 20; kill $LP 2>/dev/null || true
            grep -E "AndroidRuntime|FATAL|CRASH|crashed" /tmp/results/logcat.txt > /tmp/results/crash.txt || true
            if [ -s /tmp/results/crash.txt ]; then cat /tmp/results/crash.txt; echo "::error::CRASHES"; else echo "OK: No crashes"; fi
            grep -iE "pandora|AppFactory|CreatorProxy|ShadowHook" /tmp/results/logcat.txt > /tmp/results/hook.txt || true
            if [ -s /tmp/results/hook.txt ]; then echo "OK: Hook loaded"; else echo "::warning::No hook in logcat"; fi
            echo "=== [5/5] Screenshot ==="
            adb shell screencap -p /sdcard/screen.png 2>/dev/null || true
            adb pull /sdcard/screen.png /tmp/results/screen.png 2>/dev/null || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-verification
          path: /tmp/results/
          retention-days: 14
