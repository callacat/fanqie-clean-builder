name: Fanqie Clean Build Pipeline

on:
  workflow_dispatch:
    inputs:
      skip_emulator:
        description: 'Skip Android Emulator verification'
        type: boolean
        default: false

env:
  MODDED_URL: 'https://github.com/callacat/gha-build-farm/releases/download/apk-assets/fanqie_novel_7.2.4.19.apk'
  JAVA_TOOL_OPTIONS: '-Xmx6g'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }

      - name: Install apktool
        run: |
          curl -sL "https://github.com/iBotPeaches/Apktool/releases/download/v3.0.2/apktool_3.0.2.jar" -o /opt/apktool.jar
          printf '#!/bin/bash\njava -jar /opt/apktool.jar "$@"\n' > /opt/apktool && chmod +x /opt/apktool

      - name: Download & decode modded APK
        run: |
          mkdir -p _downloads _build
          curl -sL -o _downloads/modded.apk "$MODDED_URL"
          /opt/apktool if _downloads/modded.apk 2>&1 | tail -1 || true
          /opt/apktool d _downloads/modded.apk -o _build/source -f
          [ -f _build/source/AndroidManifest.xml ] || exit 1

      - name: Nuke invalid resource dirs (anti-repackaging measure)
        run: |
          rm -rf _build/source/res/invalid15 2>/dev/null || true
          PUB="_build/source/res/values/public.xml"
          [ -f "$PUB" ] && grep -vE 'type="invalid[0-9]+"' "$PUB" > "${PUB}.clean" && mv "${PUB}.clean" "$PUB"
          echo "Invalid resources cleaned"

      - name: Strip Ad SDK + Push + Tracking
        run: |
          python3 scripts/remove-ad-sdk.py \
            --source _build/source \
            --ad-config config/ad-removal.json \
            --push-config config/push-removal.json \
            --permissions-keep config/permissions-keep.txt

      - name: Strip DPatch tracking code (keep only CreatorProxy + DATA)
        run: |
          rm -f $(find _build/source -path "*/pandora/core/AppFactory.smali" ! -path "*\$DATA*") 2>/dev/null || true
          rm -f $(find _build/source -path "*/pandora/core/Copyright.smali") 2>/dev/null || true
          rm -f $(find _build/source -path "*/ۧۤۤ.smali") 2>/dev/null || true
          echo "Remaining pandora-core files:"
          find _build/source -path "*/pandora/core/*" -name "*.smali" 2>/dev/null || echo "none"

      - name: Modify Manifest
        run: |
          python3 scripts/modify-manifest.py --skip-component-factory \
            --manifest _build/source/AndroidManifest.xml \
            --push-config config/push-removal.json \
            --permissions-keep config/permissions-keep.txt

      - name: Enable jumbo mode (safety net)
        run: |
          YML="_build/source/apktool.yml"
          [ -f "$YML" ] && grep -q 'smali.jumbo' "$YML" && \
            sed -i 's/smali\.jumbo.*/smali.jumbo: true/' "$YML" || \
            echo "smali.jumbo: true" >> "$YML"
          grep "jumbo" "$YML"

      - name: Rebuild APK
        run: |
          /opt/apktool b _build/source -o _build/fanqie-unsigned.apk 2>&1 | tail -5
          ls -lh _build/fanqie-unsigned.apk || exit 1

      - name: Sign APK
        run: |
          [ -f debug.keystore ] || keytool -genkey -v -keystore debug.keystore -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android \
            -dname "CN=Debug,O=Clean,C=CN"
          jarsigner -sigalg SHA1withRSA -digestalg SHA1 \
            -keystore debug.keystore -storepass android \
            _build/fanqie-unsigned.apk debug 2>&1 | tail -2
          mv _build/fanqie-unsigned.apk _build/fanqie-clean.apk

      - name: Verify APK
        run: |
          ls -lh _build/fanqie-clean.apk
          unzip -l _build/fanqie-clean.apk 2>/dev/null | grep -q AndroidManifest.xml && echo "VALID" || echo "INVALID"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fanqie-clean-apk
          path: _build/fanqie-clean.apk
          retention-days: 90

  emulator-test:
    needs: build
    if: ${{ !cancelled() && !inputs.skip_emulator }}
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: fanqie-clean-apk
          path: _apk/

      - name: Find APK
        id: apk
        run: |
          APK=$(find _apk -name '*.apk' -type f | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"

      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: default
          arch: x86_64
          ram-size: 3072M
          heap-size: 1024M
          disk-size: 4096M
          emulator-options: -no-window -no-audio -no-boot-anim -no-snapshot -memory 2048
          disable-animations: true
          emulator-not-wait: false
          boot-timeout: 600s
          script: |
            mkdir -p /tmp/r
            # Strip arm64 libs so APK installs on x86_64 emulator (Java layer test)
            APK="${{ steps.apk.outputs.path }}"
            STRIPPED="/tmp/r/fanqie-clean-stripped.apk"
            cp "$APK" "$STRIPPED"
            (cd /tmp/r && zip -d "fanqie-clean-stripped.apk" "lib/*") 2>/dev/null || true
            adb install -t "$STRIPPED" | tee /tmp/r/install.txt
            adb shell am start -n com.dragon.read/.pages.splash.SplashActivity || true
            sleep 5
            adb logcat -c 2>/dev/null || true
            adb logcat > /tmp/r/logcat.txt &
            sleep 15; kill %1 2>/dev/null || true
            grep -E "AndroidRuntime|FATAL|CRASH" /tmp/r/logcat.txt > /tmp/r/crash.txt || true
            [ -s /tmp/r/crash.txt ] && echo "CRASH" | cat - /tmp/r/crash.txt || echo "OK"
            grep -iE "pandora|CreatorProxy|ShadowHook" /tmp/r/logcat.txt > /tmp/r/hook.txt || true
            [ -s /tmp/r/hook.txt ] && echo "HOOK OK" || echo "NO HOOK"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: emulator-verification
          path: /tmp/r/
          retention-days: 14
